name: dbt Snowflake Run

on:
  push:
    branches: [ main ]

jobs:
  dbt-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # HCP Terraform APIから変数を取得して環境変数に展開
      - name: Fetch variables from HCP Terraform
        run: |
          # ワークスペースの変数一覧をAPI取得
          RESPONSE=$(curl -s \
            --header "Authorization: Bearer ${{ secrets.HCP_API_TOKEN }}" \
            --header "Content-Type: application/vnd.api+json" \
            "https://app.terraform.io/api/v2/workspaces/ws-J2rtbnPn3rAFi8yV/vars")

          # 各変数をGITHUB_ENVに書き出す
          # ※ Sensitiveな変数はAPIレスポンスでvalue=""になるため別途対応（後述）
          echo "$RESPONSE" | \
            python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for var in data['data']:
            key = var['attributes']['key']
            value = var['attributes']['value'] or ''
            sensitive = var['attributes']['sensitive']
            if not sensitive:
              print(f'{key}={value}')
          " >> $GITHUB_ENV

      - name: Install dbt and Run
        working-directory: ./dbt/mydbt
        env:
          # Sensitiveな変数はGitHub Secretsから直接参照（※後述）
          DBT_ENV_SECRET_PRIVATE_KEY: ${{ secrets.DBT_SNOWFLAKE_PRIVATE_KEY }}
        run: |
          pip install --no-cache-dir dbt-snowflake
          dbt debug --profiles-dir .
          dbt run --profiles-dir .