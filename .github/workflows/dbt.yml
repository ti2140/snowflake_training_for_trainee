name: dbt Snowflake Run

on:
  push:
    branches: [ main ]

jobs:
  dbt-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch variables from HCP Terraform
        run: |
          RESPONSE=$(curl -s \
            --header "Authorization: Bearer ${{ secrets.HCP_API_TOKEN }}" \
            --header "Content-Type: application/vnd.api+json" \
            "https://app.terraform.io/api/v2/workspaces/ws-wSwSw3TQ4Ni93Rjv/vars")

          echo "$RESPONSE" | python3 << 'EOF' >> $GITHUB_ENV
import sys, json
data = json.load(sys.stdin)
for var in data['data']:
    key = var['attributes']['key']
    value = var['attributes']['value'] or ''
    sensitive = var['attributes']['sensitive']
    if not sensitive:
        print(f'{key}={value}')
EOF

      - name: Debug variables
        run: |
          echo "=== GITHUB_ENV contents ==="
          cat $GITHUB_ENV

      - name: Install dbt and Run
        working-directory: ./dbt/mydbt
        env:
          DBT_ENV_SECRET_PRIVATE_KEY: ${{ secrets.DBT_ENV_SECRET_PRIVATE_KEY }}
        run: |
          pip install --no-cache-dir dbt-snowflake
          dbt debug --profiles-dir .
          dbt run --profiles-dir .