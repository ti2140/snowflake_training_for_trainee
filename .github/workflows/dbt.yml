name: dbt Snowflake Run

on:
  push:
    branches: [ main ]

jobs:
  dbt-run:
    runs-on: ubuntu-latest

    steps:
      # 1. GitHubリポジトリのコードをチェックアウト
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Python環境のセットアップ
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. HCP Terraformから変数を安全に一括同期する
      - name: Sync HCP Terraform Variables
        uses: hashicorp/tfe-sync-actions@v1
        with:
          token: ${{ secrets.TFC_TOKEN }}
          workspace: "ws-J2rtbnPn3rAFi8yV"

      # 4. dbt-snowflakeのインストールと環境変数の設定
      - name: Install dbt and Run
        # 実際のdbtプロジェクトがあるディレクトリを指定
        working-directory: ./dbt/mydbt
        env:
          # HCP Terraformで「Sensitive（秘匿）」として登録されている変数は、
          # 同期実行によって GitHubの "Secrets" 側に自動作成されます。
          # そのため「secrets.変数名」の構文で呼び出す必要があります。
          DBT_ENV_SECRET_PRIVATE_KEY: ${{ secrets.dbt_snowflake_private_key }}
        run: |
          pip install --no-cache-dir dbt-snowflake
          dbt debug --profiles-dir .
          dbt run --profiles-dir .