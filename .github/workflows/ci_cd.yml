name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest

    env:
      TF_TOKEN_app_terraform_io: ${{ secrets.HCP_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Format Check
        working-directory: terraform
        run: terraform fmt -check

      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan

      - name: Terraform Apply
        working-directory: terraform
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve

  dbt:
    name: dbt
    runs-on: ubuntu-latest
    needs: terraform        # ← terraformジョブの完了後に実行

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch variables from HCP Terraform
        run: |
          curl -s \
            --header "Authorization: Bearer ${{ secrets.HCP_API_TOKEN }}" \
            --header "Content-Type: application/vnd.api+json" \
            "https://app.terraform.io/api/v2/workspaces/ws-wSwSw3TQ4Ni93Rjv/vars" \
            | python3 src/fetch_tfc_vars.py >> $GITHUB_ENV

      - name: Install dbt and Run
        working-directory: ./dbt/mydbt
        env:
          DBT_ENV_SECRET_PRIVATE_KEY: ${{ secrets.DBT_ENV_SECRET_PRIVATE_KEY }}
        run: |
          # Bashで記述
          pip install --no-cache-dir dbt-snowflake
          dbt debug --profiles-dir .
          # トリガーがPRの時はcompile、mainマージ時はrunを実行
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            dbt compile --profiles-dir .
          else
            dbt run --profiles-dir .
          fi